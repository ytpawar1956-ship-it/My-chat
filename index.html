<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Sora:wght@300;400;600&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0f;
      --surface: #13131a;
      --border: #1f1f2e;
      --accent: #7c6aff;
      --accent-dim: #3d3480;
      --text: #e2e2f0;
      --text-muted: #6b6b88;
      --user-bubble: #1a1a2e;
      --ai-bubble: #111118;
      --font-ui: 'Sora', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --radius: 14px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LAYOUT ── */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 12px var(--accent); }
      50% { opacity: 0.5; box-shadow: 0 0 4px var(--accent); }
    }

    header h1 {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    header h1 span {
      color: var(--accent);
    }

    .clear-btn {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    /* ── MESSAGES ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      text-align: center;
      padding: 60px 24px;
      opacity: 0;
      animation: fadein 0.6s 0.3s forwards;
    }

    @keyframes fadein {
      to { opacity: 1; }
    }

    .empty-icon {
      font-size: 36px;
      filter: grayscale(0.3);
    }

    .empty-state h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    .empty-state p {
      font-size: 13px;
      color: var(--text-muted);
      max-width: 320px;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }

    .suggestion-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      font-family: var(--font-mono);
      padding: 7px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion-chip:hover {
      border-color: var(--accent-dim);
      color: var(--accent);
      background: #16152b;
    }

    /* ── MESSAGE ROWS ── */
    .row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: slidein 0.25s ease;
    }

    @keyframes slidein {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .row.user { align-items: flex-end; }
    .row.ai { align-items: flex-start; }

    .role-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 4px;
    }

    .row.user .role-label { color: var(--accent); opacity: 0.6; }

    .bubble {
      max-width: 82%;
      padding: 13px 18px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .row.user .bubble {
      background: var(--user-bubble);
      border: 1px solid #2a2a45;
      border-bottom-right-radius: 4px;
      color: #d4d4f0;
    }

    .row.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    /* ── TYPING INDICATOR ── */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 14px 20px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.4;
      animation: blink 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 100% { opacity: 0.2; transform: scale(0.85); }
      50% { opacity: 1; transform: scale(1); }
    }

    /* ── ERROR BUBBLE ── */
    .error-bubble {
      background: #1f0f0f;
      border: 1px solid #3d1515;
      color: #e07070;
      font-size: 13px;
      font-family: var(--font-mono);
      border-radius: var(--radius);
      padding: 12px 16px;
      max-width: 82%;
    }

    /* ── INPUT AREA ── */
    .input-area {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 3px rgba(124, 106, 255, 0.08);
    }

    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      resize: none;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14.5px;
      line-height: 1.55;
      max-height: 180px;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      background: var(--accent);
      border: none;
      border-radius: 9px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .send-btn:hover:not(:disabled) {
      background: #9080ff;
      transform: scale(1.05);
    }

    .send-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .send-btn svg { display: block; }

    .hint {
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 10px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="logo-dot"></div>
      <h1><span>claude</span> · chat</h1>
      <button class="clear-btn" onclick="clearChat()">clear</button>
    </header>

    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✦</div>
        <h2>What's on your mind?</h2>
        <p>Ask anything — Claude is ready.</p>
        <div class="suggestions">
          <button class="suggestion-chip" onclick="fillSuggestion('Explain quantum entanglement simply')">Explain quantum entanglement</button>
          <button class="suggestion-chip" onclick="fillSuggestion('Write a haiku about the monsoon')">Write a haiku</button>
          <button class="suggestion-chip" onclick="fillSuggestion('Give me 5 startup ideas for 2025')">Startup ideas</button>
          <button class="suggestion-chip" onclick="fillSuggestion('Debug my code — how do I reverse a string in Python?')">Debug help</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea
          id="input"
          rows="1"
          placeholder="Ask something..."
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M13.5 8L2.5 2.5L5.5 8L2.5 13.5L13.5 8Z" fill="white" stroke="white" stroke-width="1" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <p class="hint">Enter to send · Shift+Enter for new line</p>
    </div>
  </div>

  <script>
    const history = [];

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 180) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function fillSuggestion(text) {
      const input = document.getElementById('input');
      input.value = text;
      autoResize(input);
      input.focus();
    }

    function clearChat() {
      history.length = 0;
      const msgs = document.getElementById('messages');
      msgs.innerHTML = `
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">✦</div>
          <h2>What's on your mind?</h2>
          <p>Ask anything — Claude is ready.</p>
          <div class="suggestions">
            <button class="suggestion-chip" onclick="fillSuggestion('Explain quantum entanglement simply')">Explain quantum entanglement</button>
            <button class="suggestion-chip" onclick="fillSuggestion('Write a haiku about the monsoon')">Write a haiku</button>
            <button class="suggestion-chip" onclick="fillSuggestion('Give me 5 startup ideas for 2025')">Startup ideas</button>
            <button class="suggestion-chip" onclick="fillSuggestion('Debug my code — how do I reverse a string in Python?')">Debug help</button>
          </div>
        </div>`;
    }

    function addMessage(role, text, isError = false) {
      const empty = document.getElementById('emptyState');
      if (empty) empty.remove();

      const msgs = document.getElementById('messages');
      const row = document.createElement('div');
      row.className = `row ${role}`;

      const label = document.createElement('div');
      label.className = 'role-label';
      label.textContent = role === 'user' ? 'you' : 'claude';

      const bubble = document.createElement('div');
      if (isError) {
        bubble.className = 'error-bubble';
        bubble.textContent = '⚠ ' + text;
      } else {
        bubble.className = 'bubble';
        bubble.textContent = text;
      }

      row.appendChild(label);
      row.appendChild(bubble);
      msgs.appendChild(row);
      msgs.scrollTop = msgs.scrollHeight;
      return bubble;
    }

    function addTyping() {
      const empty = document.getElementById('emptyState');
      if (empty) empty.remove();

      const msgs = document.getElementById('messages');
      const row = document.createElement('div');
      row.className = 'row ai';
      row.id = 'typing';

      const label = document.createElement('div');
      label.className = 'role-label';
      label.textContent = 'claude';

      const bubble = document.createElement('div');
      bubble.className = 'bubble typing-bubble';
      bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

      row.appendChild(label);
      row.appendChild(bubble);
      msgs.appendChild(row);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      input.value = '';
      input.style.height = 'auto';

      addMessage('user', text);
      history.push({ role: 'user', content: text });
      addTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });

        const data = await res.json();
        removeTyping();

        if (!res.ok || data.error) {
          addMessage('ai', data.error || 'Something went wrong.', true);
        } else {
          addMessage('ai', data.reply);
          history.push({ role: 'assistant', content: data.reply });
        }
      } catch (err) {
        removeTyping();
        addMessage('ai', 'Network error — check your connection.', true);
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }
  </script>
</body>
</html>
